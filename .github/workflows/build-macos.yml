name: build-macos

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-macos.yml'
      - 'macos/CLICaptureBridgeMac/**'

jobs:
  build-macos-app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build app bundle
        working-directory: macos/CLICaptureBridgeMac
        run: |
          chmod +x scripts/package-app.sh
          ./scripts/package-app.sh

      - name: Zip app bundle
        working-directory: macos/CLICaptureBridgeMac/dist
        run: ditto -c -k --sequesterRsrc --keepParent 'CLI截图桥.app' 'CLI截图桥-macos-unsigned.zip'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CLI截图桥-macos-unsigned
          path: macos/CLICaptureBridgeMac/dist/CLI截图桥-macos-unsigned.zip
          if-no-files-found: error